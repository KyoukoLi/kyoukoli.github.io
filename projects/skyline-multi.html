<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>九洲大陆 — 多角色叙事</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a12;color:#fff;min-height:100vh;display:flex;flex-direction:column}

/* 背景 */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-layer{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a1040 0%,#0a0a12 60%)}
.bg-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:pulse var(--d,3s) ease-in-out infinite;animation-delay:var(--dl,0s)}
@keyframes pulse{0%,100%{opacity:0.1}50%{opacity:0.8}}
@keyframes spin{to{transform:rotate(360deg)}}

/* 顶部 */
.header{position:relative;z-index:10;padding:12px 20px;display:flex;align-items:center;gap:12px;background:rgba(10,10,18,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)}
.header-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.9)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s infinite}
.header-sub{font-size:11px;color:rgba(255,255,255,0.4)}

/* 对话区 */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;z-index:5;position:relative}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* 每段叙事 */
.narrative-block{display:flex;flex-direction:column;gap:8px;animation:fadeIn 0.4s ease}

/* 旁白 */
.narration{font-size:14px;line-height:2;color:rgba(255,255,255,0.65);padding:10px 16px;background:rgba(255,255,255,0.03);border-left:3px solid rgba(196,163,90,0.5);border-radius:0 8px 8px 0}

/* 台词行 */
.dialogue-row{display:flex;flex-wrap:wrap;gap:10px;padding:4px 0}

/* 单句台词 */
.line{display:flex;flex-direction:column;gap:3px;min-width:120px;max-width:45%}
.line-meta{display:flex;align-items:center;gap:5px}
.line-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.line-name{font-size:11px;font-weight:600;color:rgba(255,255,255,0.45)}
.line-bubble{padding:9px 13px;border-radius:10px;font-size:14px;line-height:1.8;word-break:break-word}

/* 云霄 */
.ln-yx .line-avatar{background:linear-gradient(135deg,rgba(196,163,90,0.5),rgba(139,105,20,0.5));color:#c4a35a}
.ln-yx .line-bubble{background:rgba(196,163,90,0.08);border:1px solid rgba(196,163,90,0.2);border-radius:4px 12px 12px 12px}

/* 镇月 */
.ln-zy .line-avatar{background:linear-gradient(135deg,rgba(100,180,255,0.4),rgba(60,120,200,0.4));color:#7cb9e8}
.ln-zy .line-bubble{background:rgba(100,180,255,0.06);border:1px solid rgba(100,180,255,0.15);border-radius:4px 12px 12px 12px}

/* 用户 */
.ln-me{justify-content:flex-end}
.ln-me .line-bubble{background:linear-gradient(135deg,#c4a35a,#8b6914);color:#1a0f00;border-radius:12px 4px 12px 12px}

/* 系统 */
.sys{text-align:center;font-size:12px;color:rgba(255,255,255,0.2);padding:6px 0;font-style:italic}

/* 输入 */
.input-bar{position:relative;z-index:10;padding:12px 16px;background:rgba(10,10,18,0.9);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06)}
.quick-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.quick-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{background:rgba(255,255,255,0.12)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-field{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;resize:none;max-height:100px;outline:none;transition:border-color 0.2s;font-family:inherit;line-height:1.5}
.input-field:focus{border-color:rgba(255,200,100,0.4)}
.input-field::placeholder{color:rgba(255,255,255,0.3)}
.send-btn{background:linear-gradient(135deg,#c4a35a,#8b6914);border:none;border-radius:10px;padding:10px 18px;color:#1a0f00;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap}
.send-btn:hover{opacity:0.9}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

/* 加载 */
.loading{text-align:center;padding:8px;color:rgba(255,255,255,0.3);font-size:12px;display:none}
.loading.show{display:block}
.loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.1);border-top-color:rgba(255,200,100,0.6);border-radius:50%;animation:spin 0.8s linear infinite;margin-left:6px;vertical-align:middle}
.typing{color:rgba(255,255,255,0.4);font-size:13px;padding:4px 0;display:none}
.typing.show{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.dialogue-row{flex-direction:column}.chat{padding:14px 12px}.quick-btns{gap:6px}}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <div class="header-title">九洲大陆</div>
  <div class="header-sub" id="statusText">连接中…</div>
</div>

<div class="chat" id="chat">
  <div class="sys">命运的齿轮开始转动……</div>
</div>

<div class="typing" id="typing">云霄正在说话…</div>

<div class="input-bar">
  <div class="quick-btns">
    <button class="quick-btn" onclick="sendQuick('继续')">▶ 继续</button>
    <button class="quick-btn" onclick="sendQuick('给用户两个选择')">⚡ 选项</button>
    <button class="quick-btn" onclick="sendQuick('深呼吸')">🌬 深呼吸</button>
    <button class="quick-btn" onclick="sendQuick('/newchat')">🆕 重置</button>
  </div>
  <div class="input-row">
    <textarea class="input-field" id="inputField" rows="1" placeholder="打字让故事继续…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const TUNNEL = 'https://treatments-fired-puts-starts.trycloudflare.com';
const API = TUNNEL + '/chat';

const SYSTEM = `【世界观】九洲大陆，修仙世界。
【角色】
- 云霄：算命先生，修士，百年前失去修为。玩世不恭，说话先绕圈子再直击要害。金色气泡。
- 镇月：云霄师妹，活泼直率，重情重义，说话直接。蓝色气泡。

【输出格式 - 必须严格遵守】
用以下格式输出一整段故事（300字以上）：
旁白/场景描写（用*星号包裹*斜体文字描写环境、动作、氛围）
「云霄：台词」
「镇月：台词」

要求：
- 一段旁白后接多个角色的台词
- 旁白要有画面感（光线、声音、动作、表情）
- 云霄和镇月都要说话
- 禁止内心独白，禁止推理过程
- 禁止分段——一整段写完`;

// ============ 变量 ============
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
let history = [];

// 生成星星背景
(function(){
  const bg = document.getElementById('bg');
  for(let i=0;i<40;i++){
    const s=document.createElement('div');
    s.className='bg-star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--d',(2+Math.random()*4)+'s');
    s.style.setProperty('--dl',Math.random()*4+'s');
    bg.appendChild(s);
  }
})();

// ============ 解析 & 渲染 ============
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderBlock(text){
  const block = document.createElement('div');
  block.className = 'narrative-block';

  // 旁白（*星号包裹*的文字）
  const narRegex = /\*(.*?)\*/g;
  let lastIndex = 0;
  let match;
  let hasNarration = false;

  // 先提取所有旁白片段
  const narrations = [];
  while((match = narRegex.exec(text)) !== null){
    hasNarration = true;
    narrations.push({start: match.index, end: match.index + match[0].length, content: match[1].trim()});
  }

  if(hasNarration){
    narrations.forEach(n => {
      const nar = document.createElement('div');
      nar.className = 'narration';
      nar.textContent = n.content;
      block.appendChild(nar);
    });
  }

  // 台词行
  const lineRegex = /「([^：:：]+)[：:：]([^」]+)」/g;
  let hasLines = false;
  const row = document.createElement('div');
  row.className = 'dialogue-row';

  while((match = lineRegex.exec(text)) !== null){
    hasLines = true;
    const role = match[1].trim();
    const line = match[2].trim();
    const isYx = role.includes('云霄');
    const isZy = role.includes('镇月');
    if(!isYx && !isZy) continue; // 只显示云霄和镇月

    const div = document.createElement('div');
    div.className = `line ${isYx ? 'ln-yx' : 'ln-zy'}`;
    div.innerHTML = `
      <div class="line-meta">
        <div class="line-avatar">${isYx ? '霄' : '镇'}</div>
        <div class="line-name">${role}</div>
      </div>
      <div class="line-bubble">${escapeHtml(line)}</div>`;
    row.appendChild(div);
  }

  if(hasLines) block.appendChild(row);

  // 兜底：整段没有格式就当旁白
  if(!hasNarration && !hasLines){
    const nar = document.createElement('div');
    nar.className = 'narration';
    nar.textContent = text;
    block.appendChild(nar);
  }

  chatEl.appendChild(block);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addUser(text){
  const block = document.createElement('div');
  block.className = 'narrative-block';
  const row = document.createElement('div');
  row.className = 'dialogue-row';
  row.style.justifyContent = 'flex-end';
  row.innerHTML = `<div class="line ln-me"><div class="line-bubble">${escapeHtml(text)}</div></div>`;
  block.appendChild(row);
  chatEl.appendChild(block);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addSys(text){
  const div = document.createElement('div');
  div.className = 'sys';
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setLoading(on){
  sendBtn.disabled = on;
  inputEl.disabled = on;
  typingEl.className = on ? 'typing show' : 'typing';
}

// ============ API ============
async function callAPI(prompt){
  const body = {prompt, system: SYSTEM, maxTokens: 8000};
  const resp = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if(!resp.ok) throw new Error('网络错误: ' + resp.status);
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message || 'API错误');
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if(!text) throw new Error('无内容返回');
  return text;
}

// ============ 发送 ============
async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text || sendBtn.disabled) return;
  inputEl.value = '';

  if(text === '/newchat'){
    history = [];
    chatEl.innerHTML = '<div class="sys">命运的齿轮重新转动……</div>';
    addSys('—— 重新开始 ——');
    return;
  }

  addUser(text);
  history.push({role:'user', text});
  setLoading(true);

  try{
    const last = history.length > 1 ? history[history.length-2]?.text?.slice(-100) : '';
    const prompt = `对话历史：${last}\n\n用户说：${text}\n\n继续故事，用*旁白*和「角色：台词」格式，云霄和镇月都要说话。`;
    const response = await callAPI(prompt);
    renderBlock(response);
    history.push({role:'assistant', text:response});
    setLoading(false);
  }catch(e){
    addSys('⚠ ' + e.message);
    setLoading(false);
  }
}

async function sendQuick(text){
  inputEl.value = text;
  await sendMessage();
}

// ============ 初始化 ============
(async function init(){
  statusText.textContent = '连接正常';
  setLoading(true);
  try{
    const response = await callAPI('云霄在茶摊边开场，*用旁白描写场景*，云霄和镇月都要有台词，不少于300字。');
    renderBlock(response);
    history.push({role:'assistant', text:response});
    addSys('—— 第一章 · 茶摊相遇 ——');
  }catch(e){
    addSys('⚠ 连接失败: ' + e.message);
    statusDot.style.background = '#f87171';
    statusText.textContent = '连接失败';
  }
  setLoading(false);
})();
</script>
</body>
</html>
