  <style>
/**
 * 私生模拟器 - 暗色调 UI
 * 心理惊悚 + 高对比度 + 低饱和度
 */

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #252525;
  
  --text-primary: #e0e0e0;
  --text-secondary: #888888;
  --text-muted: #555555;
  
  --accent-red: #c0392b;
  --accent-orange: #d35400;
  --accent-yellow: #f39c12;
  --accent-green: #27ae60;
  --accent-blue: #2980b9;
  --accent-purple: #8e44ad;
  
  --border-color: #2a2a2a;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  
  --font-main: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Consolas', monospace;
  
  --radius: 4px;
  --transition: 0.3s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-main);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(ellipse at top left, rgba(30, 30, 30, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(20, 20, 20, 0.5) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

/* 主容器 */
.game-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 标题区域 */
.game-header {
  text-align: center;
  padding: 30px 0;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 20px;
}

.game-title {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 8px;
  color: var(--text-primary);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.game-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 4px;
}

/* 偶像信息卡 */
.celebrity-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.celebrity-info {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.celebrity-name {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
}

.celebrity-type {
  font-size: 12px;
  color: var(--text-secondary);
}

.difficulty-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.difficulty-extreme { background: var(--accent-red); color: white; }
.difficulty-hard { background: var(--accent-orange); color: white; }
.difficulty-medium { background: var(--accent-yellow); color: #000; }
.difficulty-easy { background: var(--accent-green); color: white; }

/* 属性面板 */
.attributes-panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.attribute-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 15px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.attribute-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 100%;
  transition: var(--transition);
}

.attribute-card.stamina::before { background: var(--accent-green); }
.attribute-card.money::before { background: var(--accent-yellow); }
.attribute-card.stealth::before { background: var(--accent-purple); }
.attribute-card.sanity::before { background: var(--accent-red); }

.attribute-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.attribute-value {
  font-size: 24px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.attribute-value.low { color: var(--accent-red); }
.attribute-value.medium { color: var(--accent-orange); }
.attribute-value.high { color: var(--accent-green); }

.attribute-bar {
  height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.attribute-bar-fill {
  height: 100%;
  transition: var(--transition);
  border-radius: 2px;
}

.stamina .attribute-bar-fill { background: var(--accent-green); }
.money .attribute-bar-fill { background: var(--accent-yellow); }
.stealth .attribute-bar-fill { background: var(--accent-purple); }
.sanity .attribute-bar-fill { background: var(--accent-red); }

/* 进度面板 */
.progress-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.progress-label {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.progress-value {
  font-size: 18px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.progress-bar {
  height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
  transition: width 0.5s ease;
  border-radius: 4px;
}

.progress-stage {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 叙事区域 */
.narrative-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 25px;
  margin-bottom: 20px;
  min-height: 200px;
  position: relative;
}

.narrative-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-primary);
  white-space: pre-wrap;
}

.narrative-text::first-letter {
  font-size: 1.5em;
  font-weight: 500;
  float: left;
  margin-right: 8px;
  line-height: 1;
}

.event-name {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
}

.mood-tags {
  margin-top: 15px;
  display: flex;
  gap: 8px;
}

.mood-tag {
  font-size: 10px;
  color: var(--text-muted);
  padding: 4px 10px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
}

/* 选项区域 */
.options-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.option-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-primary);
  font-family: var(--font-main);
  font-size: 14px;
}

.option-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent-orange);
  transform: translateX(5px);
}

.option-btn:active {
  transform: translateX(5px) scale(0.98);
}

.option-text {
  flex: 1;
}

.option-risk {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-left: 15px;
}

.risk-low { background: rgba(39, 174, 96, 0.2); color: var(--accent-green); }
.risk-medium { background: rgba(243, 156, 18, 0.2); color: var(--accent-yellow); }
.risk-high { background: rgba(211, 84, 0, 0.2); color: var(--accent-orange); }
.risk-extreme { background: rgba(192, 57, 43, 0.2); color: var(--accent-red); }

/* 状态变化提示 */
.changes-panel {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 15px;
  margin-bottom: 20px;
  display: none;
  font-family: var(--font-mono);
  font-size: 13px;
}

.changes-panel.show {
  display: block;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.change-item {
  display: inline-block;
  margin-right: 15px;
  padding: 4px 10px;
  border-radius: var(--radius);
}

.change-positive { background: rgba(39, 174, 96, 0.15); color: var(--accent-green); }
.change-negative { background: rgba(192, 57, 43, 0.15); color: var(--accent-red); }

/* 游戏结束界面 */
.game-over-panel {
  text-align: center;
  padding: 50px 20px;
}

.game-over-title {
  font-size: 24px;
  letter-spacing: 4px;
  margin-bottom: 20px;
  color: var(--accent-red);
}

.game-over-narrative {
  font-size: 14px;
  line-height: 2;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 30px;
}

.restart-btn {
  background: var(--accent-red);
  border: none;
  color: white;
  padding: 15px 40px;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: var(--transition);
  font-family: var(--font-main);
}

.restart-btn:hover {
  background: #a93226;
  transform: scale(1.05);
}

/* 开始界面 */
.start-panel {
  text-align: center;
  padding: 60px 20px;
}

.start-title {
  font-size: 32px;
  letter-spacing: 6px;
  margin-bottom: 15px;
}

.start-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 40px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: var(--accent-red);
  border: none;
  color: white;
  padding: 18px 60px;
  font-size: 16px;
  letter-spacing: 6px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: var(--transition);
  font-family: var(--font-main);
  margin-bottom: 30px;
}

.start-btn:hover {
  background: #a93226;
  transform: scale(1.05);
}

.warning-text {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 底部状态栏 */
.status-bar {
  margin-top: auto;
  padding: 15px 0;
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 加载动画 */
.loading {
  text-align: center;
  padding: 30px;
  color: var(--text-muted);
}

.loading::after {
  content: '';
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-color);
  border-top-color: var(--accent-red);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 深渊模式特效 */
.god-view-mode .narrative-panel {
  border-color: var(--accent-purple);
  box-shadow: 0 0 30px rgba(142, 68, 173, 0.2);
}

.god-view-mode .progress-bar-fill {
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-red));
}

/* 响应式 */
@media (max-width: 768px) {
  .attributes-panel {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .game-title {
    font-size: 22px;
    letter-spacing: 4px;
  }
  
  .celebrity-card {
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }
}

/* 滚动条 */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

</style>

/**
 * 私生模拟器 - 核心配置文件
 * 这里是你唯一需要手动修改的地方
 */

window.GAME_CONFIG = {
  // ==========================================
  // API 配置 - 替换为你自己的配置
  // ==========================================
  api: {
    // 方案 A: OpenClaw 本地网关（如果你在 Mac mini 上运行）
    baseUrl: 'http://localhost:18789',
    endpoint: '/api/chat',
    apiKey: 'YOUR_OPENCLAW_API_KEY', // 本地网关通常不需要 key，留空或填 sk-local
    
    // 方案 B: MiniMax API（如果你想直接调用）
    // baseUrl: 'https://api.minimax.chat',
    // endpoint: '/v1/text/chatcompletion_v2',
    // apiKey: 'YOUR_MINIMAX_API_KEY',
    
    // 方案 C: OpenAI 兼容接口
    // baseUrl: 'https://api.openai.com',
    // endpoint: '/v1/chat/completions',
    // apiKey: 'YOUR_OPENAI_API_KEY',
    
    // 模型选择
    model: 'MiniMax-M2.5-Highspeed',
  },

  // ==========================================
  // 游戏数值配置
  // ==========================================
  game: {
    // 初始属性
    initialAttributes: {
      stamina: 100,
      money: 5000,
      stealth: 100,
      sanity: 100
    },
    
    // 追踪进度（百分比）
    initialProgress: 0,
    
    // 每日基础消耗
    dailyDrain: {
      stamina: 5,
      money: 50,
      sanity: 3
    },
    
    // 属性上限
    maxAttributes: {
      stamina: 100,
      money: Infinity, // 钱没有上限，但会归零触发 Game Over
      stealth: 100,
      sanity: 100
    },
    
    // 属性下限（归零阈值）
    minAttributes: {
      stamina: 0,
      money: 0,
      stealth: 0,
      sanity: 0
    },
    
    // 理智衰减阶段（进度达到后，理智上限开始下降）
    sanityDecayThreshold: 0.70, // 70% 进度时开始
    
    // 游戏模式
    mode: 'normal', // 'normal' | 'god_view' | 'endgame'
    
    // 调试模式（显示更多日志）
    debug: false
  }
};

// 导出配置（Node.js 环境用）
if (typeof module !== 'undefined' && module.exports) {
  module.exports = window.GAME_CONFIG;
}

</script>

  <script>
/**
 * 私生模拟器 - 核心游戏引擎
 * 管理状态机、事件触发、数值计算
 */

(function() {
  'use strict';

  // =============================================
  // 游戏状态
  // =============================================
  
  const GameState = {
    // 元数据
    id: null,
    createdAt: null,
    celebrity: null,
    daysElapsed: 0,
    currentPhase: 'playing', // 'playing' | 'god_view' | 'endgame' | 'ended'
    
    // 核心属性
    attributes: {
      stamina: 100,
      money: 5000,
      stealth: 100,
      sanity: 100
    },
    
    // 追踪进度
    progress: 0,
    
    // 特殊状态
    special: {
      rentedApartment: false,
      hasGPSDevice: false,
      isBlacklisted: false,
      hasSecretPhoto: false
    },
    
    // 事件记录
    eventHistory: [],
    choiceHistory: [],
    
    // 终局选择
    finalChoice: null,
    
    // 当前事件
    currentEvent: null,
    currentOptions: [],
    
    // 结算
    isGameOver: false,
    gameOverReason: null,
    endingId: null,
    
    // 深渊模式（神之视角）
    godViewMode: false,
    daysInGodView: 0
  };

  // =============================================
  // 事件选择器
  // =============================================
  
  function selectNextEvent() {
    const allEvents = [
      ...window.EVENT_LIBRARY.coreEvents,
      ...window.EVENT_LIBRARY.dailyEvents,
      ...window.EVENT_LIBRARY.randomEvents
    ];
    
    // 过滤可触发的事件
    const available = allEvents.filter(e => {
      // 检查冷却
      if (e.trigger?.cooldown) {
        const recentEvents = GameState.eventHistory.slice(-e.trigger.cooldown);
        if (recentEvents.includes(e.id)) return false;
      }
      
      // 检查一次性
      if (e.trigger?.oneTime && GameState.eventHistory.includes(e.id)) return false;
      
      // 检查黑名单
      if (GameState.special.isBlacklisted && !e.id.includes('warning')) {
        return false;
      }
      
      // 检查条件
      if (e.trigger?.condition) {
        return evaluateCondition(e.trigger.condition);
      }
      
      return true;
    });
    
    if (available.length === 0) {
      return window.EVENT_LIBRARY.dailyEvents.find(e => e.id === 'rest_day') || null;
    }
    
    // 加权随机选择
    const totalWeight = available.reduce((sum, e) => sum + (e.trigger?.weight || 10), 0);
    let random = Math.random() * totalWeight;
    
    for (const event of available) {
      random -= (event.trigger?.weight || 10);
      if (random <= 0) return event;
    }
    
    return available[0];
  }

  // =============================================
  // 条件求值器（简单的字符串表达式解析）
  // =============================================
  
  function evaluateCondition(condition) {
    try {
      // 安全替换变量
      const ctx = {
        stamina: GameState.attributes.stamina,
        money: GameState.attributes.money,
        stealth: GameState.attributes.stealth,
        sanity: GameState.attributes.sanity,
        progress: GameState.progress,
        daysElapsed: GameState.daysElapsed
      };
      
      let expr = condition;
      for (const [key, val] of Object.entries(ctx)) {
        expr = expr.replace(new RegExp(`\\b${key}\\b`, 'g'), val);
      }
      
      // 安全求值（只允许数值比较）
      return Function('"use strict"; return (' + expr + ')')();
    } catch (e) {
      console.warn('条件求值失败:', condition, e);
      return false;
    }
  }

  // =============================================
  // 事件处理
  // =============================================
  
  function processEvent(event) {
    if (!event) return null;
    
    // 检查强制事件
    const isForced = event.forced || false;
    
    // 解析选项
    let options = (event.options || []).map(opt => ({
      id: opt.action,
      text: opt.text,
      effects: opt.effects || {},
      successRate: opt.successRate,
      successEffects: opt.successEffects,
      failEffects: opt.failEffects,
      permanent: opt.permanent,
      riskEvent: opt.riskEvent
    }));
    
    // 如果没有选项，添加默认"继续"
    if (options.length === 0) {
      options.push({
        id: 'continue',
        text: '继续',
        effects: { stamina: -5 }
      });
    }
    
    return {
      eventId: event.id,
      eventName: event.name,
      description: event.description,
      forced: isForced,
      effects: event.effects,
      options: options,
      narrative: event.description // 简化：直接用描述作为叙述文本
    };
  }

  // =============================================
  // 选项执行
  // =============================================
  
  function executeChoice(option, eventId) {
    const result = {
      narrative: '',
      changes: {},
      options: [],
      isGameOver: false,
      isFinal: false,
      endingType: null
    };
    
    // 记录事件
    GameState.eventHistory.push(eventId);
    GameState.choiceHistory.push(option.id);
    
    // 处理成功率
    if (option.successRate !== undefined) {
      const roll = Math.random();
      if (roll <= option.successRate) {
        // 成功
        Object.assign(GameState.attributes, option.successEffects || {});
        result.changes = { ...option.successEffects };
      } else {
        // 失败
        Object.assign(GameState.attributes, option.failEffects || {});
        result.changes = { ...option.failEffects };
      }
    } else {
      // 普通选项
      Object.assign(GameState.attributes, option.effects || {});
      result.changes = { ...option.effects };
    }
    
    // 进度处理
    if (option.effects?.progress) {
      GameState.progress = Math.max(0, Math.min(100, GameState.progress + option.effects.progress));
    }
    if (option.successEffects?.progress) {
      GameState.progress = Math.max(0, Math.min(100, GameState.progress + option.successEffects.progress));
    }
    
    // 永久效果
    if (option.permanent) {
      Object.assign(GameState.special, option.permanent);
      if (option.permanent.dailyProgress) {
        GameState.special.dailyProgressBonus = option.permanent.dailyProgress;
      }
    }
    
    // 风险事件
    if (option.riskEvent) {
      const riskEvent = window.EVENT_LIBRARY.riskEvents[option.riskEvent];
      if (riskEvent) {
        Object.assign(GameState.attributes, riskEvent.effects);
        if (riskEvent.immediateGameOver) {
          GameState.isGameOver = true;
          GameState.gameOverReason = riskEvent.name;
        }
      }
    }
    
    // 每日结算
    GameState.daysElapsed++;
    applyDailyDrain();
    
    // 检查深渊模式触发
    if (GameState.progress >= 100 && !GameState.godViewMode) {
      return triggerEndgame(result);
    }
    
    // 检查游戏结束
    checkGameOver(result);
    
    // 生成下一个事件
    if (!result.isGameOver) {
      const nextEvent = selectNextEvent();
      const processedEvent = processEvent(nextEvent);
      GameState.currentEvent = processedEvent;
      
      result.narrative = processedEvent ? processedEvent.description : '又一天过去了……';
      result.options = processedEvent ? processedEvent.options : [];
    }
    
    return result;
  }

  // =============================================
  // 每日结算
  // =============================================
  
  function applyDailyDrain() {
    const config = window.GAME_CONFIG.game;
    
    // 基础消耗
    GameState.attributes.stamina = Math.max(0, 
      GameState.attributes.stamina - config.dailyDrain.stamina);
    GameState.attributes.money = Math.max(0, 
      GameState.attributes.money - config.dailyDrain.money);
    GameState.attributes.sanity = Math.max(0, 
      GameState.attributes.sanity - config.dailyDrain.sanity);
    
    // 隐蔽度每日小幅随机波动
    const stealthDelta = Math.floor(Math.random() * 11) - 5; // -5 到 +5
    GameState.attributes.stealth = Math.max(0, Math.min(100, 
      GameState.attributes.stealth + stealthDelta));
    
    // 租房子减免消耗
    if (GameState.special.rentedApartment) {
      GameState.attributes.money -= Math.floor(config.dailyDrain.money * 0.8);
      // 每日进度加成
      GameState.progress = Math.min(100, GameState.progress + (GameState.special.dailyProgressBonus || 0));
    }
    
    // 深渊模式：理智上限衰减
    if (GameState.progress >= config.sanityDecayThreshold * 100) {
      config.maxAttributes.sanity = Math.max(20, config.maxAttributes.sanity - 2);
      GameState.attributes.sanity = Math.min(GameState.attributes.sanity, config.maxAttributes.sanity);
      GameState.godViewMode = true;
      GameState.daysInGodView++;
    }
  }

  // =============================================
  // 终局触发
  // =============================================
  
  function triggerEndgame(result) {
    GameState.currentPhase = 'endgame';
    
    const endgameEvent = window.EVENT_LIBRARY.endgameEvents[0];
    
    result.narrative = `快门声在寂静中格外响亮。
    
那张照片——足以毁掉一个人的那张——正躺在你的手机相册里。
    
偶像的车灯消失在夜色中。他/她永远不会知道，刚才发生了什么。
    
但你知道。
    
现在，你要做什么？`;
    
    result.options = [
      {
        id: 'expose',
        text: '发送/曝光',
        effects: {},
        description: '让全世界看到真相'
      },
      {
        id: 'sell',
        text: '卖掉照片',
        effects: {},
        description: '用它换一笔钱'
      },
      {
        id: 'keep',
        text: '保留，不发',
        effects: {},
        description: '你有底牌，但你选择不用'
      }
    ];
    
    result.isFinal = true;
    result.changes = { progress: 0, sanity: -30 };
    
    GameState.attributes.sanity -= 30;
    GameState.special.hasSecretPhoto = true;
    
    return result;
  }

  // =============================================
  // 游戏结束检查
  // =============================================
  
  function checkGameOver(result) {
    const attrs = GameState.attributes;
    
    // 归零检查
    if (attrs.stamina <= 0) {
      return endGame('collapsed', result);
    }
    if (attrs.money <= 0) {
      return endGame('bankrupt', result);
    }
    if (attrs.stealth <= 0) {
      return endGame('exposed', result);
    }
    if (attrs.sanity <= 0) {
      return endGame('insane', result);
    }
    
    // 超时检查（偶像退圈）
    if (GameState.daysElapsed >= 90 && GameState.progress < 50) {
      return endGame('idol_quit', result);
    }
    
    return null;
  }

  // =============================================
  // 结束游戏
  // =============================================
  
  function endGame(endingId, result) {
    GameState.isGameOver = true;
    GameState.endingId = endingId;
    GameState.currentPhase = 'ended';
    
    const ending = [
      ...(window.ENDINGS.badEndings || []),
      ...(window.ENDINGS.neutralEndings || []),
      ...(window.ENDINGS.goodEndings || [])
    ].find(e => e.id === endingId);
    
    if (ending) {
      let narrative = ending.narrative;
      // 替换动态变量
      narrative = narrative.replace(/\{days\}/g, GameState.daysElapsed);
      
      result.narrative = `【${ending.title}】

${narrative}

${ending.afterword || ''}`;
      
      result.endingType = endingId;
    } else {
      result.narrative = '游戏结束。';
    }
    
    result.isGameOver = true;
    result.options = [
      {
        id: 'restart',
        text: '重新开始',
        effects: {},
        description: '再来一局'
      }
    ];
    
    return result;
  }

  // =============================================
  // 终局选择处理
  // =============================================
  
  function executeFinalChoice(choiceId) {
    const result = {
      narrative: '',
      changes: {},
      options: [],
      isGameOver: true,
      isFinal: true,
      endingType: choiceId
    };
    
    GameState.finalChoice = choiceId;
    
    let ending;
    if (choiceId === 'expose') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'destruction');
    } else if (choiceId === 'sell') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'blackmail');
    } else if (choiceId === 'keep') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'god_view');
      GameState.godViewMode = true;
      GameState.currentPhase = 'god_view';
    }
    
    if (ending) {
      result.narrative = `【${ending.title}】

${ending.narrative}

${ending.afterword || ''}`;
      result.endingType = ending.id;
    }
    
    result.options = [
      {
        id: 'restart',
        text: '重新开始',
        effects: {},
        description: '再来一局'
      }
    ];
    
    return result;
  }

  // =============================================
  // 游戏初始化
  // =============================================
  
  function initGame() {
    const config = window.GAME_CONFIG.game;
    const celebrity = window.getRandomCelebrity();
    
    // 重置状态
    Object.assign(GameState, {
      id: Date.now().toString(36),
      createdAt: new Date().toISOString(),
      celebrity: celebrity,
      daysElapsed: 0,
      currentPhase: 'playing',
      attributes: { ...config.initialAttributes },
      progress: config.initialProgress,
      special: {
        rentedApartment: false,
        hasGPSDevice: false,
        isBlacklisted: false,
        hasSecretPhoto: false
      },
      eventHistory: [],
      choiceHistory: [],
      finalChoice: null,
      isGameOver: false,
      gameOverReason: null,
      endingId: null,
      godViewMode: false,
      daysInGodView: 0
    });
    
    // 第一个事件
    const firstEvent = selectNextEvent();
    const processedEvent = processEvent(firstEvent);
    GameState.currentEvent = processedEvent;
    
    return {
      status: 'ready',
      celebrity: {
        name: celebrity.name,
        alias: celebrity.alias,
        type: celebrity.type,
        difficulty: celebrity.difficulty
      },
      attributes: GameState.attributes,
      progress: GameState.progress,
      event: processedEvent,
      daysElapsed: GameState.daysElapsed
    };
  }

  // =============================================
  // 获取当前状态（用于 UI 更新）
  // =============================================
  
  function getCurrentState() {
    return {
      attributes: { ...GameState.attributes },
      progress: GameState.progress,
      currentEvent: GameState.currentEvent,
      daysElapsed: GameState.daysElapsed,
      isGameOver: GameState.isGameOver,
      isFinal: GameState.currentPhase === 'endgame',
      godViewMode: GameState.godViewMode,
      special: { ...GameState.special }
    };
  }

  // =============================================
  // 导出 API
  // =============================================
  
  window.SasaengSimulator = {
    init: initGame,
    getState: getCurrentState,
    executeChoice: executeChoice,
    executeFinalChoice: executeFinalChoice,
    evaluateCondition: evaluateCondition
  };

})();

</script>
  <script>
/**
 * 私生模拟器 - OpenClaw API 集成
 * 处理与大语言模型后端的通信
 */

(function() {
  'use strict';

  // =============================================
  // API 配置
  // =============================================
  
  const config = () => window.GAME_CONFIG.api;
  
  // =============================================
  // 状态历史（用于上下文管理）
  // =============================================
  
  const conversationHistory = [];

  // =============================================
  // 构建 System Prompt
  // =============================================
  
  function buildSystemPrompt(celebrity, gameState) {
    const difficultyLabel = {
      extreme: '炼狱',
      hard: '困难',
      medium: '普通',
      easy: '简单'
    };

    return `【私生模拟器 - 游戏引擎】

你是"私生模拟器"游戏的叙事引擎。玩家扮演一个极端狂热的私生饭，追踪偶像 ${celebrity.name}（${celebrity.alias}，${celebrity.type}）。

## 当前游戏状态
- 偶像：${celebrity.name} | 难度：${difficultyLabel[celebrity.difficulty]} | 追踪进度：${gameState.progress}%
- 体力：${gameState.attributes.stamina}/100
- 资金：¥${gameState.attributes.money}
- 隐蔽度：${gameState.attributes.stealth}/100
- 理智：${gameState.attributes.sanity}/100
- 已追踪天数：${gameState.daysElapsed}天

## 游戏阶段
${gameState.currentPhase === 'endgame' ? '【终局阶段】玩家已获得绝密照片，即将做出最终抉择' : '【正常游戏】资源管理与风险决策'}

${gameState.godViewMode ? '【深渊模式】玩家进入了"神之视角"状态，理智上限正在持续衰减' : ''}

## 叙事风格要求
- 语言：简体中文，第一人称视角
- 语气：压抑、紧张、黑色幽默
- 细节：注重感官描写（天气、声音、气味）
- 节奏：每个叙事块不超过100字，制造悬念
- 禁止：直接描写暴力/色情内容

## 数值规则（严格遵守）
- 玩家资金低于¥2000时：必须显示"经济危机"相关叙事
- 隐蔽度低于30时：必须触发安保发现风险
- 理智低于30时：必须触发心理崩溃相关叙事
- 追踪进度每+10%，叙述紧张感提升一个等级

## 输出格式（严格遵守，仅输出JSON）
{
  "narrative": "叙事文本，描述当前场景的细节（100-200字）",
  "mood": "当前氛围关键词（2-3个）",
  "changes": {
    "stamina": 数值变化（含正负符号，如 -10 或 +5）,
    "money": 数值变化,
    "stealth": 数值变化,
    "sanity": 数值变化,
    "progress": 数值变化
  },
  "options": [
    {
      "id": "选项ID（英文）",
      "text": "选项文字（玩家看到的选择）",
      "risk": "low/medium/high/extreme",
      "description": "风险提示"
    }
  ],
  "isGameOver": false,
  "isFinal": false,
  "endingType": null
}

## 核心事件参考
1. 机票失败 - 高资金消耗
2. VIP通道走空 - 纯负面事件
3. GPS追踪器 - 高风险高回报
4. 地库蹲守 - 进度倒退风险
5. 手机被删 - 隐蔽度大幅下降
6. 相机被格式化 - 毁灭性打击
7. 翻垃圾桶 - 理智换进度
8. 租对面楼 - 巨额资金换长期优势

请根据当前状态，选择最合适的下一个事件，生成符合叙事的JSON输出。`;
  }

  // =============================================
  // 构建用户消息
  // =============================================
  
  function buildUserMessage(action, currentState, eventDescription) {
    const actionLabels = {
      'buy_ticket_black': '买黄牛票硬闯',
      'give_up_flight': '放弃航班',
      'buy_economy': '买经济舱跟随',
      'rest_hotel': '回酒店休息',
      'install_gps': '安装GPS定位器',
      'chase_wrong_car': '追错车',
      'resist_deletion': '反抗保护手机',
      'pretend_innocent': '假装路人粉',
      'decrypt_trash': '翻垃圾桶解密',
      'rent_apartment': '租对面楼的房子',
      'accept_loss': '认栽',
      'confront_informant': '找情报贩子算账',
      'watch_drama': '吃瓜看戏',
      'fan_war_attack': '下场对骂',
      'rest_day': '休整一天',
      'continue': '继续行动'
    };

    return `玩家选择了：${actionLabels[action] || action}

当前状态：
- 体力：${currentState.attributes.stamina}/100
- 资金：¥${currentState.attributes.money}
- 隐蔽度：${currentState.attributes.stealth}/100
- 理智：${currentState.attributes.sanity}/100
- 进度：${currentState.progress}%

请生成这个选择的结果叙事和下一个可选事件。`;
  }

  // =============================================
  // 调用 OpenClaw API
  // =============================================
  
  async function callOpenClaw(messages, temperature = 0.8) {
    const cfg = config();
    
    try {
      const response = await fetch(`${cfg.baseUrl}${cfg.endpoint}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${cfg.apiKey}`
        },
        body: JSON.stringify({
          model: cfg.model,
          messages: messages,
          temperature: temperature,
          max_tokens: 800
        })
      });

      if (!response.ok) {
        throw new Error(`API 请求失败: ${response.status}`);
      }

      const data = await response.json();
      return data;
    } catch (error) {
      console.error('API 调用失败:', error);
      throw error;
    }
  }

  // =============================================
  // 解析 LLM 返回的 JSON
  // =============================================
  
  function parseLLMResponse(text) {
    try {
      // 尝试提取 JSON 块
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }
      throw new Error('无法解析 JSON');
    } catch (error) {
      console.warn('JSON 解析失败，尝试修复:', error);
      // 回退到本地处理
      return null;
    }
  }

  // =============================================
  // 主游戏循环（与 LLM 交互）
  // =============================================
  
  async function playWithLLM(action, gameState, celebrity) {
    const systemPrompt = buildSystemPrompt(celebrity, gameState);
    
    // 构建消息历史
    const messages = [
      { role: 'system', content: systemPrompt }
    ];
    
    // 添加历史
    conversationHistory.forEach(msg => {
      messages.push(msg);
    });
    
    // 添加当前行动
    const userMessage = buildUserMessage(action, gameState, gameState.currentEvent?.description);
    messages.push({ role: 'user', content: userMessage });
    
    // 调用 API
    let response;
    try {
      response = await callOpenClaw(messages);
    } catch (error) {
      // API 失败时回退到本地引擎
      console.warn('LLM 不可用，回退到本地引擎');
      return null;
    }
    
    // 解析响应
    const content = response.choices?.[0]?.message?.content;
    if (!content) {
      console.warn('API 返回内容为空');
      return null;
    }
    
    // 保存到历史
    conversationHistory.push({ role: 'user', content: userMessage });
    conversationHistory.push({ role: 'assistant', content: content });
    
    // 限制历史长度
    if (conversationHistory.length > 20) {
      conversationHistory.splice(0, 4);
    }
    
    return parseLLMResponse(content);
  }

  // =============================================
  // 模式选择：本地引擎 vs LLM 增强
  // =============================================
  
  async function processAction(action) {
    const gameState = window.SasaengSimulator.getState();
    
    // 优先尝试 LLM
    if (window.GAME_CONFIG.api.apiKey && window.GAME_CONFIG.api.apiKey !== 'YOUR_OPENCLAW_API_KEY') {
      try {
        const llmResult = await playWithLLM(action, gameState, GameState.celebrity);
        if (llmResult) {
          return llmResult;
        }
      } catch (e) {
        console.warn('LLM 模式失败:', e);
      }
    }
    
    // 回退到本地引擎
    return window.SasaengSimulator.executeChoice({ id: action }, gameState.currentEvent?.eventId);
  }

  // =============================================
  // 重置对话历史
  // =============================================
  
  function resetConversation() {
    conversationHistory.length = 0;
  }

  // =============================================
  // 导出 API
  // =============================================
  
  window.GameAPI = {
    processAction: processAction,
    resetConversation: resetConversation,
    buildSystemPrompt: buildSystemPrompt
  };

})();

</script>

  <div class="game-container" id="gameContainer">

  <script>
    // =============================================
    // 全局状态
    // =============================================
    
    let currentState = null;
    let isProcessing = false;
    
    // =============================================
    // UI 更新函数
    // =============================================
    
    function updateUI(state) {
      currentState = state;
      
      // 更新属性
      const attrs = state.attributes;
      
      updateAttribute('stamina', attrs.stamina, 100);
      updateAttribute('stealth', attrs.stealth, 100);
      updateAttribute('sanity', attrs.sanity, 100);
      
      // 资金特殊处理
      const moneyEl = document.getElementById('moneyValue');
      const moneyBar = document.getElementById('moneyBar');
      moneyEl.textContent = `¥${attrs.money}`;
      const moneyPercent = Math.min(100, (attrs.money / 5000) * 100);
      moneyBar.style.width = `${moneyPercent}%`;
      updateValueClass(moneyEl, attrs.money, 1000, 2000, 5000);
      
      // 更新进度
      document.getElementById('progressValue').textContent = `${state.progress}%`;
      document.getElementById('progressBar').style.width = `${state.progress}%`;
      
      // 更新进度阶段
      const stage = getProgressStage(state.progress);
      document.getElementById('progressStage').textContent = stage;
      
      // 更新天数
      document.getElementById('statusDays').textContent = `追踪天数: ${state.daysElapsed}`;
      
      // 深渊模式特效
      if (state.godViewMode) {
        document.getElementById('gameContainer').classList.add('god-view-mode');
        document.getElementById('statusMode').textContent = '【深渊模式】';
      }
    }
    
    function updateAttribute(name, value, max) {
      const valueEl = document.getElementById(`${name}Value`);
      const barEl = document.getElementById(`${name}Bar`);
      
      valueEl.textContent = value;
      barEl.style.width = `${(value / max) * 100}%`;
      
      updateValueClass(valueEl, value, max * 0.3, max * 0.5, max);
    }
    
    function updateValueClass(el, value, low, medium, high) {
      el.classList.remove('low', 'medium', 'high');
      if (value <= low) el.classList.add('low');
      else if (value <= medium) el.classList.add('medium');
      else el.classList.add('high');
    }
    
    function getProgressStage(progress) {
      if (progress < 30) return '萌芽期 - 一切才刚刚开始';
      if (progress < 60) return '沉没期 - 已经无法回头';
      if (progress < 90) return '深渊期 - 离终点越来越近';
      return '终局 - 做出你的选择';
    }
    
    function showChanges(changes) {
      const panel = document.getElementById('changesPanel');
      if (!changes || Object.keys(changes).length === 0) {
        panel.classList.remove('show');
        return;
      }
      
      let html = '';
      for (const [key, value] of Object.entries(changes)) {
        if (value === 0) continue;
        const cls = value > 0 ? 'change-positive' : 'change-negative';
        const sign = value > 0 ? '+' : '';
        const labels = { stamina: '体力', money: '资金', stealth: '隐蔽', sanity: '理智', progress: '进度' };
        html += `<span class="change-item ${cls}">${labels[key] || key}: ${sign}${value}</span>`;
      }
      
      panel.innerHTML = html;
      panel.classList.add('show');
      
      setTimeout(() => panel.classList.remove('show'), 3000);
    }
    
    // =============================================
    // 游戏流程控制
    // =============================================
    
    function startGame() {
      // 加载事件库
      if (!window.EVENT_LIBRARY) {
        loadEventsData();
      }
      
      // 初始化游戏
      const initResult = window.SasaengSimulator.init();
      
      // 更新 UI
      document.getElementById('startPanel').style.display = 'none';
      document.getElementById('gamePanel').style.display = 'block';
      document.getElementById('gameOverPanel').style.display = 'none';
      document.getElementById('statusBar').style.display = 'flex';
      
      // 设置偶像信息
      document.getElementById('celebrityName').textContent = `${initResult.celebrity.name}「${initResult.celebrity.alias}」`;
      document.getElementById('celebrityType').textContent = initResult.celebrity.type;
      
      const badge = document.getElementById('difficultyBadge');
      badge.textContent = { extreme: '炼狱', hard: '困难', medium: '普通', easy: '简单' }[initResult.celebrity.difficulty] || '普通';
      badge.className = `difficulty-badge difficulty-${initResult.celebrity.difficulty}`;
      
      // 显示第一个事件
      showEvent(initResult.event);
      
      // 更新状态
      updateUI(window.SasaengSimulator.getState());
    }
    
    function showEvent(event) {
      document.getElementById('eventName').textContent = event?.eventName || '';
      document.getElementById('narrativeText').textContent = event?.description || '...';
      document.getElementById('moodTags').innerHTML = '';
      
      // 渲染选项
      const optionsPanel = document.getElementById('optionsPanel');
      if (event?.options && event.options.length > 0) {
        optionsPanel.innerHTML = event.options.map(opt => `
          <button class="option-btn" onclick="selectOption('${opt.id}')" ${isProcessing ? 'disabled' : ''}>
            <span class="option-text">${opt.text}</span>
            <span class="option-risk risk-${opt.risk || 'medium'}">${opt.risk || 'medium'}</span>
          </button>
        `).join('');
      }
    }
    
    async function selectOption(optionId) {
      if (isProcessing) return;
      isProcessing = true;
      
      // 显示加载状态
      document.getElementById('narrativeText').innerHTML = '<span class="loading">处理中</span>';
      document.getElementById('optionsPanel').innerHTML = '';
      
      try {
        // 调用 API 或本地引擎
        const result = await window.GameAPI.processAction(optionId);
        
        if (result) {
          // 显示变化
          showChanges(result.changes);
          
          // 更新状态
          const state = window.SasaengSimulator.getState();
          updateUI(state);
          
          // 检查游戏结束
          if (result.isGameOver) {
            showGameOver(result);
            return;
          }
          
          // 检查终局
          if (result.isFinal) {
            showFinalChoice(result);
            return;
          }
          
          // 显示新事件
          if (result.narrative) {
            document.getElementById('narrativeText').textContent = result.narrative;
          }
          
          // 渲染新选项
          if (result.options && result.options.length > 0) {
            document.getElementById('optionsPanel').innerHTML = result.options.map(opt => `
              <button class="option-btn" onclick="selectOption('${opt.id}')">
                <span class="option-text">${opt.text}</span>
                <span class="option-risk risk-${opt.risk || 'medium'}">${opt.risk || 'medium'}</span>
              </button>
            `).join('');
          } else {
            document.getElementById('optionsPanel').innerHTML = `
              <button class="option-btn" onclick="selectOption('continue')">
                <span class="option-text">继续</span>
                <span class="option-risk risk-low">继续</span>
              </button>
            `;
          }
        }
      } catch (error) {
        console.error('游戏处理失败:', error);
        document.getElementById('narrativeText').textContent = '游戏出错，请重试。';
      } finally {
        isProcessing = false;
      }
    }
    
    function showFinalChoice(result) {
      document.getElementById('narrativeText').textContent = result.narrative;
      document.getElementById('eventName').textContent = '【终局抉择】';
      
      document.getElementById('optionsPanel').innerHTML = result.options.map(opt => `
        <button class="option-btn" onclick="selectFinalOption('${opt.id}')">
          <span class="option-text">${opt.text}</span>
          <span class="option-risk risk-extreme">终局</span>
        </button>
      `).join('');
    }
    
    async function selectFinalOption(optionId) {
      if (isProcessing) return;
      isProcessing = true;
      
      try {
        const result = window.SasaengSimulator.executeFinalChoice(optionId);
        showGameOver(result);
      } catch (error) {
        console.error('终局处理失败:', error);
      } finally {
        isProcessing = false;
      }
    }
    
    function showGameOver(result) {
      document.getElementById('gamePanel').style.display = 'none';
      document.getElementById('gameOverPanel').style.display = 'block';
      
      const titleEl = document.getElementById('gameOverTitle');
      const narrativeEl = document.getElementById('gameOverNarrative');
      
      // 尝试提取标题
      const titleMatch = result.narrative.match(/【(.+?)】/);
      if (titleMatch) {
        titleEl.textContent = titleMatch[1];
      } else {
        titleEl.textContent = '游戏结束';
      }
      
      narrativeEl.textContent = result.narrative;
    }
    
    function restartGame() {
      window.GameAPI.resetConversation();
      document.getElementById('gameContainer').classList.remove('god-view-mode');
      startGame();
    }
    
    // =============================================
    // 数据加载
    // =============================================
    
    function loadEventsData() {
      // events.js 已经在 data/events.json 中定义
      // 这里确保它被加载
      fetch('data/events.json')
        .then(r => r.json())
        .then(data => {
          window.EVENT_LIBRARY = data;
        })
        .catch(e => {
          console.warn('事件数据加载失败:', e);
        });
    }
    
    // 页面加载完成后检查数据
    document.addEventListener('DOMContentLoaded', () => {
      // 延迟加载事件数据
      if (!window.EVENT_LIBRARY) {
        fetch('data/events.json')
          .then(r => r.json())
          .then(data => {
            window.EVENT_LIBRARY = data;
          });
      }
    });
  </script>
</body>
</html>
