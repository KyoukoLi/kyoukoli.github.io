<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>私生模拟器 | Sasaeng Simulator</title>
  <style>
/**
 * 私生模拟器 - 暗色调 UI
 * 心理惊悚 + 高对比度 + 低饱和度
 */

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #252525;
  
  --text-primary: #e0e0e0;
  --text-secondary: #888888;
  --text-muted: #555555;
  
  --accent-red: #c0392b;
  --accent-orange: #d35400;
  --accent-yellow: #f39c12;
  --accent-green: #27ae60;
  --accent-blue: #2980b9;
  --accent-purple: #8e44ad;
  
  --border-color: #2a2a2a;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  
  --font-main: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Consolas', monospace;
  
  --radius: 4px;
  --transition: 0.3s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-main);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(ellipse at top left, rgba(30, 30, 30, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(20, 20, 20, 0.5) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

/* 主容器 */
.game-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 标题区域 */
.game-header {
  text-align: center;
  padding: 30px 0;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 20px;
}

.game-title {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 8px;
  color: var(--text-primary);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.game-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 4px;
}

/* 偶像信息卡 */
.celebrity-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.celebrity-info {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.celebrity-name {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
}

.celebrity-type {
  font-size: 12px;
  color: var(--text-secondary);
}

.difficulty-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.difficulty-extreme { background: var(--accent-red); color: white; }
.difficulty-hard { background: var(--accent-orange); color: white; }
.difficulty-medium { background: var(--accent-yellow); color: #000; }
.difficulty-easy { background: var(--accent-green); color: white; }

/* 属性面板 */
.attributes-panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.attribute-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 15px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.attribute-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 100%;
  transition: var(--transition);
}

.attribute-card.stamina::before { background: var(--accent-green); }
.attribute-card.money::before { background: var(--accent-yellow); }
.attribute-card.stealth::before { background: var(--accent-purple); }
.attribute-card.sanity::before { background: var(--accent-red); }

.attribute-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.attribute-value {
  font-size: 24px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.attribute-value.low { color: var(--accent-red); }
.attribute-value.medium { color: var(--accent-orange); }
.attribute-value.high { color: var(--accent-green); }

.attribute-bar {
  height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.attribute-bar-fill {
  height: 100%;
  transition: var(--transition);
  border-radius: 2px;
}

.stamina .attribute-bar-fill { background: var(--accent-green); }
.money .attribute-bar-fill { background: var(--accent-yellow); }
.stealth .attribute-bar-fill { background: var(--accent-purple); }
.sanity .attribute-bar-fill { background: var(--accent-red); }

/* 进度面板 */
.progress-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.progress-label {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.progress-value {
  font-size: 18px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.progress-bar {
  height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
  transition: width 0.5s ease;
  border-radius: 4px;
}

.progress-stage {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 结果叙述面板（Phase 1） */
.result-panel {
  background: var(--bg-card);
  border: 1px solid var(--accent-orange);
  border-radius: var(--radius);
  padding: 25px;
  margin-bottom: 20px;
  min-height: 180px;
  position: relative;
  display: none;
  animation: slideIn 0.4s ease;
}

.result-label {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 10px;
  color: var(--accent-orange);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 8px;
  background: rgba(211, 84, 0, 0.1);
  border: 1px solid rgba(211, 84, 0, 0.3);
  border-radius: var(--radius);
}

.result-text {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-primary);
  white-space: pre-wrap;
  font-style: italic;
}

.result-text::first-letter {
  font-size: 1.5em;
  font-weight: 500;
  float: left;
  margin-right: 8px;
  line-height: 1;
  color: var(--accent-orange);
}

.continue-btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--accent-orange);
  color: var(--accent-orange);
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: var(--transition);
  font-family: var(--font-main);
}

.continue-btn:hover {
  background: rgba(211, 84, 0, 0.1);
  transform: translateX(3px);
}

/* 叙事区域 */
.narrative-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 25px;
  margin-bottom: 20px;
  min-height: 200px;
  position: relative;
}

.narrative-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-primary);
  white-space: pre-wrap;
}

.narrative-text::first-letter {
  font-size: 1.5em;
  font-weight: 500;
  float: left;
  margin-right: 8px;
  line-height: 1;
}

.event-name {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
}

.mood-tags {
  margin-top: 15px;
  display: flex;
  gap: 8px;
}

.mood-tag {
  font-size: 10px;
  color: var(--text-muted);
  padding: 4px 10px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
}

/* 选项区域 */
.options-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.option-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-primary);
  font-family: var(--font-main);
  font-size: 14px;
}

.option-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent-orange);
  transform: translateX(5px);
}

.option-btn:active {
  transform: translateX(5px) scale(0.98);
}

.option-text {
  flex: 1;
}

.option-risk {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-left: 15px;
}

.risk-low { background: rgba(39, 174, 96, 0.2); color: var(--accent-green); }
.risk-medium { background: rgba(243, 156, 18, 0.2); color: var(--accent-yellow); }
.risk-high { background: rgba(211, 84, 0, 0.2); color: var(--accent-orange); }
.risk-extreme { background: rgba(192, 57, 43, 0.2); color: var(--accent-red); }

/* 状态变化提示 */
.changes-panel {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 15px;
  margin-bottom: 20px;
  display: none;
  font-family: var(--font-mono);
  font-size: 13px;
}

.changes-panel.show {
  display: block;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.change-item {
  display: inline-block;
  margin-right: 15px;
  padding: 4px 10px;
  border-radius: var(--radius);
}

.change-positive { background: rgba(39, 174, 96, 0.15); color: var(--accent-green); }
.change-negative { background: rgba(192, 57, 43, 0.15); color: var(--accent-red); }

/* 游戏结束界面 */
.game-over-panel {
  text-align: center;
  padding: 50px 20px;
}

.game-over-title {
  font-size: 24px;
  letter-spacing: 4px;
  margin-bottom: 20px;
  color: var(--accent-red);
}

.game-over-narrative {
  font-size: 14px;
  line-height: 2;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 30px;
}

.restart-btn {
  background: var(--accent-red);
  border: none;
  color: white;
  padding: 15px 40px;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: var(--transition);
  font-family: var(--font-main);
}

.restart-btn:hover {
  background: #a93226;
  transform: scale(1.05);
}

/* 开始界面 */
.start-panel {
  text-align: center;
  padding: 60px 20px;
}

.start-title {
  font-size: 32px;
  letter-spacing: 6px;
  margin-bottom: 15px;
}

.start-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 40px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: var(--accent-red);
  border: none;
  color: white;
  padding: 18px 60px;
  font-size: 16px;
  letter-spacing: 6px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: var(--transition);
  font-family: var(--font-main);
  margin-bottom: 30px;
}

.start-btn:hover {
  background: #a93226;
  transform: scale(1.05);
}

.warning-text {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 底部状态栏 */
.status-bar {
  margin-top: auto;
  padding: 15px 0;
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* 加载动画 */
.loading {
  text-align: center;
  padding: 30px;
  color: var(--text-muted);
}

.loading::after {
  content: '';
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-color);
  border-top-color: var(--accent-red);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 深渊模式特效 */
.god-view-mode .narrative-panel {
  border-color: var(--accent-purple);
  box-shadow: 0 0 30px rgba(142, 68, 173, 0.2);
}

.god-view-mode .progress-bar-fill {
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-red));
}

/* 响应式 */
@media (max-width: 768px) {
  .attributes-panel {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .game-title {
    font-size: 22px;
    letter-spacing: 4px;
  }
  
  .celebrity-card {
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }
}

/* 滚动条 */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

</style>

/**
 * 私生模拟器 - 核心配置文件
 * 这里是你唯一需要手动修改的地方
 */

window.GAME_CONFIG = {
  // ==========================================
  // API 配置 - 替换为你自己的配置
  // ==========================================
  api: {
    // 方案 A: OpenClaw 本地网关（如果你在 Mac mini 上运行）
    baseUrl: 'http://localhost:18789',
    endpoint: '/api/chat',
    apiKey: 'YOUR_OPENCLAW_API_KEY', // 本地网关通常不需要 key，留空或填 sk-local
    
    // 方案 B: MiniMax API（如果你想直接调用）
    // baseUrl: 'https://api.minimax.chat',
    // endpoint: '/v1/text/chatcompletion_v2',
    // apiKey: 'YOUR_MINIMAX_API_KEY',
    
    // 方案 C: OpenAI 兼容接口
    // baseUrl: 'https://api.openai.com',
    // endpoint: '/v1/chat/completions',
    // apiKey: 'YOUR_OPENAI_API_KEY',
    
    // 模型选择
    model: 'MiniMax-M2.5-Highspeed',
  },

  // ==========================================
  // 游戏数值配置
  // ==========================================
  game: {
    // 初始属性
    initialAttributes: {
      stamina: 100,
      money: 5000,
      stealth: 100,
      sanity: 100
    },
    
    // 追踪进度（百分比）
    initialProgress: 0,
    
    // 每日基础消耗
    dailyDrain: {
      stamina: 5,
      money: 50,
      sanity: 3
    },
    
    // 属性上限
    maxAttributes: {
      stamina: 100,
      money: Infinity, // 钱没有上限，但会归零触发 Game Over
      stealth: 100,
      sanity: 100
    },
    
    // 属性下限（归零阈值）
    minAttributes: {
      stamina: 0,
      money: 0,
      stealth: 0,
      sanity: 0
    },
    
    // 理智衰减阶段（进度达到后，理智上限开始下降）
    sanityDecayThreshold: 0.70, // 70% 进度时开始
    
    // 游戏模式
    mode: 'normal', // 'normal' | 'god_view' | 'endgame'
    
    // 调试模式（显示更多日志）
    debug: false
  }
};

// 导出配置（Node.js 环境用）
if (typeof module !== 'undefined' && module.exports) {
  module.exports = window.GAME_CONFIG;
}

</script>

 * 管理状态机、事件触发、数值计算
 */

(function() {
  'use strict';

  // =============================================
  // 游戏状态
  // =============================================
  
  const GameState = {
    // 元数据
    id: null,
    createdAt: null,
    celebrity: null,
    daysElapsed: 0,
    currentPhase: 'playing', // 'playing' | 'god_view' | 'endgame' | 'ended'
    
    // 核心属性
    attributes: {
      stamina: 100,
      money: 5000,
      stealth: 100,
      sanity: 100
    },
    
    // 追踪进度
    progress: 0,
    
    // 特殊状态
    special: {
      rentedApartment: false,
      hasGPSDevice: false,
      isBlacklisted: false,
      hasSecretPhoto: false
    },
    
    // 事件记录
    eventHistory: [],
    choiceHistory: [],
    
    // 终局选择
    finalChoice: null,
    
    // 当前事件
    currentEvent: null,
    currentOptions: [],
    
    // 结算
    isGameOver: false,
    gameOverReason: null,
    endingId: null,
    
    // 深渊模式（神之视角）
    godViewMode: false,
    daysInGodView: 0
  };

  // =============================================
  // 事件选择器
  // =============================================
  
  function selectNextEvent() {
    const allEvents = [
      ...window.EVENT_LIBRARY.coreEvents,
      ...window.EVENT_LIBRARY.dailyEvents,
      ...window.EVENT_LIBRARY.randomEvents
    ];
    
    // 过滤可触发的事件
    const available = allEvents.filter(e => {
      // 检查冷却
      if (e.trigger?.cooldown) {
        const recentEvents = GameState.eventHistory.slice(-e.trigger.cooldown);
        if (recentEvents.includes(e.id)) return false;
      }
      
      // 检查一次性
      if (e.trigger?.oneTime && GameState.eventHistory.includes(e.id)) return false;
      
      // 检查黑名单
      if (GameState.special.isBlacklisted && !e.id.includes('warning')) {
        return false;
      }
      
      // 检查条件
      if (e.trigger?.condition) {
        return evaluateCondition(e.trigger.condition);
      }
      
      return true;
    });
    
    if (available.length === 0) {
      return window.EVENT_LIBRARY.dailyEvents.find(e => e.id === 'rest_day') || null;
    }
    
    // 加权随机选择
    const totalWeight = available.reduce((sum, e) => sum + (e.trigger?.weight || 10), 0);
    let random = Math.random() * totalWeight;
    
    for (const event of available) {
      random -= (event.trigger?.weight || 10);
      if (random <= 0) return event;
    }
    
    return available[0];
  }

  // =============================================
  // 条件求值器（简单的字符串表达式解析）
  // =============================================
  
  function evaluateCondition(condition) {
    try {
      // 安全替换变量
      const ctx = {
        stamina: GameState.attributes.stamina,
        money: GameState.attributes.money,
        stealth: GameState.attributes.stealth,
        sanity: GameState.attributes.sanity,
        progress: GameState.progress,
        daysElapsed: GameState.daysElapsed
      };
      
      let expr = condition;
      for (const [key, val] of Object.entries(ctx)) {
        expr = expr.replace(new RegExp(`\\b${key}\\b`, 'g'), val);
      }
      
      // 安全求值（只允许数值比较）
      return Function('"use strict"; return (' + expr + ')')();
    } catch (e) {
      console.warn('条件求值失败:', condition, e);
      return false;
    }
  }

  // =============================================
  // 事件处理
  // =============================================
  
  function processEvent(event) {
    if (!event) return null;
    
    // 检查强制事件
    const isForced = event.forced || false;
    
    // 解析选项
    let options = (event.options || []).map(opt => ({
      id: opt.action,
      text: opt.text,
      effects: opt.effects || {},
      successRate: opt.successRate,
      successEffects: opt.successEffects,
      failEffects: opt.failEffects,
      permanent: opt.permanent,
      riskEvent: opt.riskEvent
    }));
    
    // 如果没有选项，添加默认"继续"
    if (options.length === 0) {
      options.push({
        id: 'continue',
        text: '继续',
        effects: { stamina: -5 }
      });
    }
    
    return {
      eventId: event.id,
      eventName: event.name,
      description: event.description,
      forced: isForced,
      effects: event.effects,
      options: options,
      narrative: event.description // 简化：直接用描述作为叙述文本
    };
  }

  // =============================================
  // 选项执行
  // =============================================
  
  function executeChoice(option, eventId) {
    const result = {
      narrative: '',
      changes: {},
      options: [],
      isGameOver: false,
      isFinal: false,
      endingType: null
    };
    
    // 记录事件
    GameState.eventHistory.push(eventId);
    GameState.choiceHistory.push(option.id);
    
    // 处理成功率
    if (option.successRate !== undefined) {
      const roll = Math.random();
      if (roll <= option.successRate) {
        // 成功
        Object.assign(GameState.attributes, option.successEffects || {});
        result.changes = { ...option.successEffects };
      } else {
        // 失败
        Object.assign(GameState.attributes, option.failEffects || {});
        result.changes = { ...option.failEffects };
      }
    } else {
      // 普通选项
      Object.assign(GameState.attributes, option.effects || {});
      result.changes = { ...option.effects };
    }
    
    // 进度处理
    if (option.effects?.progress) {
      GameState.progress = Math.max(0, Math.min(100, GameState.progress + option.effects.progress));
    }
    if (option.successEffects?.progress) {
      GameState.progress = Math.max(0, Math.min(100, GameState.progress + option.successEffects.progress));
    }
    
    // 永久效果
    if (option.permanent) {
      Object.assign(GameState.special, option.permanent);
      if (option.permanent.dailyProgress) {
        GameState.special.dailyProgressBonus = option.permanent.dailyProgress;
      }
    }
    
    // 风险事件
    if (option.riskEvent) {
      const riskEvent = window.EVENT_LIBRARY.riskEvents[option.riskEvent];
      if (riskEvent) {
        Object.assign(GameState.attributes, riskEvent.effects);
        if (riskEvent.immediateGameOver) {
          GameState.isGameOver = true;
          GameState.gameOverReason = riskEvent.name;
        }
      }
    }
    
    // 每日结算
    GameState.daysElapsed++;
    applyDailyDrain();
    
    // 检查深渊模式触发
    if (GameState.progress >= 100 && !GameState.godViewMode) {
      return triggerEndgame(result);
    }
    
    // 检查游戏结束
    checkGameOver(result);
    
    // 生成下一个事件
    if (!result.isGameOver) {
      const nextEvent = selectNextEvent();
      const processedEvent = processEvent(nextEvent);
      GameState.currentEvent = processedEvent;
      
      result.narrative = processedEvent ? processedEvent.description : '又一天过去了……';
      result.options = processedEvent ? processedEvent.options : [];
    }
    
    return result;
  }

  // =============================================
  // 每日结算
  // =============================================
  
  function applyDailyDrain() {
    const config = window.GAME_CONFIG.game;
    
    // 基础消耗
    GameState.attributes.stamina = Math.max(0, 
      GameState.attributes.stamina - config.dailyDrain.stamina);
    GameState.attributes.money = Math.max(0, 
      GameState.attributes.money - config.dailyDrain.money);
    GameState.attributes.sanity = Math.max(0, 
      GameState.attributes.sanity - config.dailyDrain.sanity);
    
    // 隐蔽度每日小幅随机波动
    const stealthDelta = Math.floor(Math.random() * 11) - 5; // -5 到 +5
    GameState.attributes.stealth = Math.max(0, Math.min(100, 
      GameState.attributes.stealth + stealthDelta));
    
    // 租房子减免消耗
    if (GameState.special.rentedApartment) {
      GameState.attributes.money -= Math.floor(config.dailyDrain.money * 0.8);
      // 每日进度加成
      GameState.progress = Math.min(100, GameState.progress + (GameState.special.dailyProgressBonus || 0));
    }
    
    // 深渊模式：理智上限衰减
    if (GameState.progress >= config.sanityDecayThreshold * 100) {
      config.maxAttributes.sanity = Math.max(20, config.maxAttributes.sanity - 2);
      GameState.attributes.sanity = Math.min(GameState.attributes.sanity, config.maxAttributes.sanity);
      GameState.godViewMode = true;
      GameState.daysInGodView++;
    }
  }

  // =============================================
  // 终局触发
  // =============================================
  
  function triggerEndgame(result) {
    GameState.currentPhase = 'endgame';
    
    const endgameEvent = window.EVENT_LIBRARY.endgameEvents[0];
    
    result.narrative = `快门声在寂静中格外响亮。
    
那张照片——足以毁掉一个人的那张——正躺在你的手机相册里。
    
偶像的车灯消失在夜色中。他/她永远不会知道，刚才发生了什么。
    
但你知道。
    
现在，你要做什么？`;
    
    result.options = [
      {
        id: 'expose',
        text: '发送/曝光',
        effects: {},
        description: '让全世界看到真相'
      },
      {
        id: 'sell',
        text: '卖掉照片',
        effects: {},
        description: '用它换一笔钱'
      },
      {
        id: 'keep',
        text: '保留，不发',
        effects: {},
        description: '你有底牌，但你选择不用'
      }
    ];
    
    result.isFinal = true;
    result.changes = { progress: 0, sanity: -30 };
    
    GameState.attributes.sanity -= 30;
    GameState.special.hasSecretPhoto = true;
    
    return result;
  }

  // =============================================
  // 游戏结束检查
  // =============================================
  
  function checkGameOver(result) {
    const attrs = GameState.attributes;
    
    // 归零检查
    if (attrs.stamina <= 0) {
      return endGame('collapsed', result);
    }
    if (attrs.money <= 0) {
      return endGame('bankrupt', result);
    }
    if (attrs.stealth <= 0) {
      return endGame('exposed', result);
    }
    if (attrs.sanity <= 0) {
      return endGame('insane', result);
    }
    
    // 超时检查（偶像退圈）
    if (GameState.daysElapsed >= 90 && GameState.progress < 50) {
      return endGame('idol_quit', result);
    }
    
    return null;
  }

  // =============================================
  // 结束游戏
  // =============================================
  
  function endGame(endingId, result) {
    GameState.isGameOver = true;
    GameState.endingId = endingId;
    GameState.currentPhase = 'ended';
    
    const ending = [
      ...(window.ENDINGS.badEndings || []),
      ...(window.ENDINGS.neutralEndings || []),
      ...(window.ENDINGS.goodEndings || [])
    ].find(e => e.id === endingId);
    
    if (ending) {
      let narrative = ending.narrative;
      // 替换动态变量
      narrative = narrative.replace(/\{days\}/g, GameState.daysElapsed);
      
      result.narrative = `【${ending.title}】

${narrative}

${ending.afterword || ''}`;
      
      result.endingType = endingId;
    } else {
      result.narrative = '游戏结束。';
    }
    
    result.isGameOver = true;
    result.options = [
      {
        id: 'restart',
        text: '重新开始',
        effects: {},
        description: '再来一局'
      }
    ];
    
    return result;
  }

  // =============================================
  // 终局选择处理
  // =============================================
  
  function executeFinalChoice(choiceId) {
    const result = {
      narrative: '',
      changes: {},
      options: [],
      isGameOver: true,
      isFinal: true,
      endingType: choiceId
    };
    
    GameState.finalChoice = choiceId;
    
    let ending;
    if (choiceId === 'expose') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'destruction');
    } else if (choiceId === 'sell') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'blackmail');
    } else if (choiceId === 'keep') {
      ending = window.ENDINGS.finalEndings.find(e => e.id === 'god_view');
      GameState.godViewMode = true;
      GameState.currentPhase = 'god_view';
    }
    
    if (ending) {
      result.narrative = `【${ending.title}】

${ending.narrative}

${ending.afterword || ''}`;
      result.endingType = ending.id;
    }
    
    result.options = [
      {
        id: 'restart',
        text: '重新开始',
        effects: {},
        description: '再来一局'
      }
    ];
    
    return result;
  }

  // =============================================
  // 游戏初始化
  // =============================================
  
  function initGame() {
    const config = window.GAME_CONFIG.game;
    const celebrity = window.getRandomCelebrity();
    
    // 重置状态
    Object.assign(GameState, {
      id: Date.now().toString(36),
      createdAt: new Date().toISOString(),
      celebrity: celebrity,
      daysElapsed: 0,
      currentPhase: 'playing',
      attributes: { ...config.initialAttributes },
      progress: config.initialProgress,
      special: {
        rentedApartment: false,
        hasGPSDevice: false,
        isBlacklisted: false,
        hasSecretPhoto: false
      },
      eventHistory: [],
      choiceHistory: [],
      finalChoice: null,
      isGameOver: false,
      gameOverReason: null,
      endingId: null,
      godViewMode: false,
      daysInGodView: 0
    });
    
    // 第一个事件
    const firstEvent = selectNextEvent();
    const processedEvent = processEvent(firstEvent);
    GameState.currentEvent = processedEvent;
    
    return {
      status: 'ready',
      celebrity: {
        name: celebrity.name,
        alias: celebrity.alias,
        type: celebrity.type,
        difficulty: celebrity.difficulty
      },
      attributes: GameState.attributes,
      progress: GameState.progress,
      event: processedEvent,
      daysElapsed: GameState.daysElapsed
    };
  }

  // =============================================
  // 获取当前状态（用于 UI 更新）
  // =============================================
  
  function getCurrentState() {
    return {
      attributes: { ...GameState.attributes },
      progress: GameState.progress,
      currentEvent: GameState.currentEvent,
      daysElapsed: GameState.daysElapsed,
      isGameOver: GameState.isGameOver,
      isFinal: GameState.currentPhase === 'endgame',
      godViewMode: GameState.godViewMode,
      special: { ...GameState.special }
    };
  }

  // =============================================
  // 获取下一个事件（用于本地回退）
  // =============================================
  
  function getNextEvent() {
    const event = selectNextEvent();
    return processEvent(event);
  }

  // =============================================
  // 导出 API
  // =============================================
  
  window.SasaengSimulator = {
    init: initGame,
    getState: getCurrentState,
    executeChoice: executeChoice,
    executeFinalChoice: executeFinalChoice,
    evaluateCondition: evaluateCondition,
    getNextEvent: getNextEvent
  };

})();

    if (phase === 'buildup') {
      return `当前状态：
- 体力：${state.attributes?.stamina ?? 0}/100
- 资金：¥${state.attributes?.money ?? 0}

- 理智：${state.attributes?.sanity ?? 0}/100
- 进度：${state.progress ?? 0}%
- 追踪天数：${state.daysElapsed ?? 0}天

请生成 BUILDUP 阶段：描写玩家当前处境的叙事铺垫（100-150字），末尾要有悬念钩子。然后提供 2-3 个选项。必须严格输出 JSON。`;
    }

    if (phase === 'endgame') {
      return `玩家已获得绝密照片。现在需要做出终局选择。

当前状态：
- 进度：${state.progress ?? 0}%
- 理智：${state.attributes?.sanity ?? 0}/100
- 资金：¥${state.attributes?.money ?? 0}

请生成终局叙事和三个选项。必须严格输出 JSON。`;
    }

    return '请继续游戏叙事。必须严格输出 JSON。';
  }

  // =============================================
  // 调用 API
  // =============================================
  
  async function callLLM(messages) {
    const cfg = config();
    
    // 检测 API 类型
    const isOpenAI = cfg.baseUrl?.includes('openai') || cfg.baseUrl?.includes('api.openai');
    const isMiniMax = cfg.baseUrl?.includes('minimax') || cfg.endpoint?.includes('chatcompletion');

    try {
      if (isMiniMax || isOpenAI) {
        // OpenAI 兼容格式
        const response = await fetch(`${cfg.baseUrl}${cfg.endpoint}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${cfg.apiKey}`
          },
          body: JSON.stringify({
            model: cfg.model || 'gpt-4o-mini',
            messages: messages,
            temperature: phase === 'result' ? 0.7 : 0.9,
            max_tokens: 600
          })
        });

        if (!response.ok) {
          throw new Error(`API 请求失败: ${response.status}`);
        }

        const data = await response.json();
        return data.choices?.[0]?.message?.content || '';
      }

      // 默认：当作 OpenClaw 格式
      const response = await fetch(`${cfg.baseUrl}${cfg.endpoint}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${cfg.apiKey}`
        },
        body: JSON.stringify({
          model: cfg.model,
          messages: messages,
          temperature: 0.8,
          max_tokens: 800
        })
      });

      if (!response.ok) {
        throw new Error(`API 请求失败: ${response.status}`);
      }

      const data = await response.json();
      return data.choices?.[0]?.message?.content || data.response || '';
    } catch (error) {
      console.error('API 调用失败:', error);
      throw error;
    }
  }

  // =============================================
  // 解析 LLM 返回的 JSON
  // =============================================
  
  let phase = 'buildup'; // 当前相位

  function parseResponse(text) {
    try {
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }
      throw new Error('无法解析 JSON');
    } catch (error) {
      console.warn('JSON 解析失败:', error);
      // 回退
      return null;
    }
  }

  // =============================================
  // 重置对话
  // =============================================
  
  function resetConversation() {
    conversationHistory.length = 0;
    phase = 'buildup';
  }

  // =============================================
  // 对外 API
  // =============================================

  /**
   * 处理玩家选择 → 生成结果叙述（Phase 1）
   */
  async function processChoice(choiceId, gameState) {
    const systemPrompt = buildSystemPrompt({ ...gameState, phase: 'result' });
    const userMessage = buildUserMessage('result', gameState, choiceId);

    const messages = [
      { role: 'system', content: systemPrompt }
    ];
    
    // 添加简短历史（最近3条）
    const recentHistory = conversationHistory.slice(-6);
    recentHistory.forEach(msg => messages.push(msg));

    messages.push({ role: 'user', content: userMessage });

    try {
      const content = await callLLM(messages);
      const parsed = parseResponse(content);

      if (parsed) {
        conversationHistory.push({ role: 'user', content: userMessage });
        conversationHistory.push({ role: 'assistant', content: content });
        phase = 'buildup';
        return { phase: 'result', data: parsed, raw: content };
      }
    } catch (e) {
      console.warn('LLM Result 失败:', e);
    }

    // LLM 失败，回退到本地
    phase = 'buildup';
    return { phase: 'result', data: null, fallback: true };
  }

  /**
   * 生成事件铺垫 + 选项（Phase 2）
   */
  async function generateBuildup(gameState) {
    const systemPrompt = buildSystemPrompt({ ...gameState, phase: 'buildup' });
    const userMessage = buildUserMessage('buildup', gameState);

    const messages = [
      { role: 'system', content: systemPrompt }
    ];

    const recentHistory = conversationHistory.slice(-4);
    recentHistory.forEach(msg => messages.push(msg));

    messages.push({ role: 'user', content: userMessage });

    try {
      const content = await callLLM(messages);
      const parsed = parseResponse(content);

      if (parsed) {
        conversationHistory.push({ role: 'user', content: userMessage });
        conversationHistory.push({ role: 'assistant', content: content });
        phase = 'options';
        return { phase: 'buildup', data: parsed, raw: content };
      }
    } catch (e) {
      console.warn('LLM Buildup 失败:', e);
    }

    // LLM 失败，回退
    phase = 'options';
    return { phase: 'buildup', data: null, fallback: true };
  }

  /**
   * 生成终局叙事（Phase Endgame）
   */
  async function generateEndgame(gameState) {
    const systemPrompt = buildSystemPrompt({ ...gameState, phase: 'endgame' });
    const userMessage = buildUserMessage('endgame', gameState);

    const messages = [
      { role: 'system', content: systemPrompt }
    ];

    try {
      const content = await callLLM(messages);
      const parsed = parseResponse(content);
      if (parsed) {
        return { phase: 'endgame', data: parsed };
      }
    } catch (e) {
      console.warn('LLM Endgame 失败:', e);
    }
    return { phase: 'endgame', data: null, fallback: true };
  }

  // 导出
  window.GameAPI = {
    processChoice,
    generateBuildup,
    generateEndgame,
    resetConversation,
    buildSystemPrompt
  };

})();

</script>

  <script>
    // =============================================
    // 全局状态
    // =============================================
    
    let currentState = null;
    let isProcessing = false;
    
    // =============================================
    // UI 更新函数
    // =============================================
    
    function updateUI(state) {
      currentState = state;
      
      // 更新属性
      const attrs = state.attributes;
      
      updateAttribute('stamina', attrs.stamina, 100);
      updateAttribute('stealth', attrs.stealth, 100);
      updateAttribute('sanity', attrs.sanity, 100);
      
      // 资金特殊处理
      const moneyEl = document.getElementById('moneyValue');
      const moneyBar = document.getElementById('moneyBar');
      moneyEl.textContent = `¥${attrs.money}`;
      const moneyPercent = Math.min(100, (attrs.money / 5000) * 100);
      moneyBar.style.width = `${moneyPercent}%`;
      updateValueClass(moneyEl, attrs.money, 1000, 2000, 5000);
      
      // 更新进度
      document.getElementById('progressValue').textContent = `${state.progress}%`;
      document.getElementById('progressBar').style.width = `${state.progress}%`;
      
      // 更新进度阶段
      const stage = getProgressStage(state.progress);
      document.getElementById('progressStage').textContent = stage;
      
      // 更新天数
      document.getElementById('statusDays').textContent = `追踪天数: ${state.daysElapsed}`;
      
      // 深渊模式特效
      if (state.godViewMode) {
        document.getElementById('gameContainer').classList.add('god-view-mode');
        document.getElementById('statusMode').textContent = '【深渊模式】';
      }
    }
    
    function updateAttribute(name, value, max) {
      const valueEl = document.getElementById(`${name}Value`);
      const barEl = document.getElementById(`${name}Bar`);
      
      valueEl.textContent = value;
      barEl.style.width = `${(value / max) * 100}%`;
      
      updateValueClass(valueEl, value, max * 0.3, max * 0.5, max);
    }
    
    function updateValueClass(el, value, low, medium, high) {
      el.classList.remove('low', 'medium', 'high');
      if (value <= low) el.classList.add('low');
      else if (value <= medium) el.classList.add('medium');
      else el.classList.add('high');
    }
    
    function getProgressStage(progress) {
      if (progress < 30) return '萌芽期 - 一切才刚刚开始';
      if (progress < 60) return '沉没期 - 已经无法回头';
      if (progress < 90) return '深渊期 - 离终点越来越近';
      return '终局 - 做出你的选择';
    }
    
    function showChanges(changes) {
      const panel = document.getElementById('changesPanel');
      if (!changes || Object.keys(changes).length === 0) {
        panel.classList.remove('show');
        return;
      }
      
      let html = '';
      for (const [key, value] of Object.entries(changes)) {
        if (value === 0) continue;
        const cls = value > 0 ? 'change-positive' : 'change-negative';
        const sign = value > 0 ? '+' : '';
        const labels = { stamina: '体力', money: '资金', stealth: '隐蔽', sanity: '理智', progress: '进度' };
        html += `<span class="change-item ${cls}">${labels[key] || key}: ${sign}${value}</span>`;
      }
      
      panel.innerHTML = html;
      panel.classList.add('show');
      
      setTimeout(() => panel.classList.remove('show'), 3000);
    }
    
    // =============================================
    // 游戏流程控制
    // =============================================
    
    function startGame() {
      // 加载事件库
      if (!window.EVENT_LIBRARY) {
        loadEventsData();
      }
      
      // 初始化游戏
      const initResult = window.SasaengSimulator.init();
      
      // 更新 UI
      document.getElementById('startPanel').style.display = 'none';
      document.getElementById('gamePanel').style.display = 'block';
      document.getElementById('gameOverPanel').style.display = 'none';
      document.getElementById('statusBar').style.display = 'flex';
      
      // 设置偶像信息
      document.getElementById('celebrityName').textContent = `${initResult.celebrity.name}「${initResult.celebrity.alias}」`;
      document.getElementById('celebrityType').textContent = initResult.celebrity.type;
      
      const badge = document.getElementById('difficultyBadge');
      badge.textContent = { extreme: '炼狱', hard: '困难', medium: '普通', easy: '简单' }[initResult.celebrity.difficulty] || '普通';
      badge.className = `difficulty-badge difficulty-${initResult.celebrity.difficulty}`;
      
      // 显示第一个事件
      showEvent(initResult.event);
      
      // 更新状态
      updateUI(window.SasaengSimulator.getState());
    }
    
    function showEvent(event) {
      document.getElementById('eventName').textContent = event?.eventName || '';
      document.getElementById('narrativeText').textContent = event?.description || '...';
      document.getElementById('moodTags').innerHTML = '';
      
      // 渲染选项
      const optionsPanel = document.getElementById('optionsPanel');
      if (event?.options && event.options.length > 0) {
        optionsPanel.innerHTML = event.options.map(opt => `
          <button class="option-btn" onclick="selectOption('${opt.id}')" ${isProcessing ? 'disabled' : ''}>
            <span class="option-text">${opt.text}</span>
            <span class="option-risk risk-${opt.risk || 'medium'}">${opt.risk || 'medium'}</span>
          </button>
        `).join('');
      }
    }

    // 显示铺垫 + 选项（Phase 2）
    function showBuildup(data) {
      const narrativePanel = document.getElementById('narrativePanel');
      const optionsPanel = document.getElementById('optionsPanel');
      
      // 显示叙事铺垫
      if (data && data.buildupNarrative) {
        document.getElementById('narrativeText').textContent = data.buildupNarrative;
        if (data.mood) {
          const tags = data.mood.split('、').map(m => `<span class="mood-tag">${m.trim()}</span>`).join('');
          document.getElementById('moodTags').innerHTML = tags;
        }
      }
      
      narrativePanel.style.display = 'block';
      
      // 渲染选项
      if (data && data.options && data.options.length > 0) {
        optionsPanel.innerHTML = data.options.map(opt => `
          <button class="option-btn" onclick="selectOption('${opt.id}')">
            <span class="option-text">${opt.text}</span>
            <span class="option-risk risk-${opt.risk || 'medium'}">${opt.risk || 'medium'}</span>
          </button>
        `).join('');
      } else {
        optionsPanel.innerHTML = '';
      }
    }

    // 显示结果叙述（Phase 1）
    function showResult(data, changes) {
      const resultPanel = document.getElementById('resultPanel');
      const narrativePanel = document.getElementById('narrativePanel');
      const optionsPanel = document.getElementById('optionsPanel');
      
      // 隐藏叙事和选项
      narrativePanel.style.display = 'none';
      optionsPanel.innerHTML = '';
      
      // 显示结果
      if (data && data.resultNarrative) {
        document.getElementById('resultText').textContent = data.resultNarrative;
        if (data.mood) {
          const tags = data.mood.split('、').map(m => `<span class="mood-tag">${m.trim()}</span>`).join('');
          document.getElementById('moodTags').innerHTML = tags;
        }
      } else {
        document.getElementById('resultText').textContent = '……';
      }
      
      // 显示属性变化
      const changesEl = document.getElementById('resultChanges');
      if (changes) {
        let html = '';
        for (const [key, value] of Object.entries(changes)) {
          if (value === 0 || value === undefined) continue;
          const cls = value > 0 ? 'change-positive' : 'change-negative';
          const sign = value > 0 ? '+' : '';
          const labels = { stamina: '体力', money: '资金', stealth: '隐蔽', sanity: '理智', progress: '进度' };
          html += `<span class="change-item ${cls}">${labels[key] || key}: ${sign}${value}</span>`;
        }
        changesEl.innerHTML = html || '';
      }
      
      resultPanel.style.display = 'block';
    }

    // 继续到下一个事件（Phase 2：铺垫 + 选项）
    async function continueToNext() {
      if (isProcessing) return;
      isProcessing = true;
      
      const resultPanel = document.getElementById('resultPanel');
      resultPanel.style.display = 'none';
      
      const state = window.SasaengSimulator.getState();
      
      // 检查是否进入终局
      if (state.progress >= 100 && !state.isGameOver) {
        await handleEndgame();
        return;
      }
      
      // 检查游戏结束
      checkGameOverResult(state);
      if (state.isGameOver) return;
      
      // 生成铺垫 + 选项（Phase 2）
      try {
        const buildup = await window.GameAPI.generateBuildup(state);
        if (buildup && buildup.data) {
          // 应用 LLM 返回的数值变化（如果有）
          if (buildup.data.changes) {
            Object.keys(buildup.data.changes).forEach(key => {
              if (state.attributes[key] !== undefined) {
                state.attributes[key] = Math.max(0, state.attributes[key] + buildup.data.changes[key]);
              }
            });
            updateUI(state);
          }
          showBuildup(buildup.data);
        } else {
          // 回退到本地引擎生成下一个事件
          const nextEvent = window.SasaengSimulator.getNextEvent();
          showBuildupFromLocal(nextEvent);
        }
      } catch (e) {
        console.warn('LLM Buildup 失败，回退到本地:', e);
        const nextEvent = window.SasaengSimulator.getNextEvent();
        showBuildupFromLocal(nextEvent);
      }
      
      isProcessing = false;
    }

    // 本地回退：从本地引擎获取下一个事件
    function showBuildupFromLocal(event) {
      const narrativePanel = document.getElementById('narrativePanel');
      narrativePanel.style.display = 'block';
      
      if (event) {
        document.getElementById('eventName').textContent = event.eventName || '';
        document.getElementById('narrativeText').textContent = event.description || '...';
        document.getElementById('moodTags').innerHTML = '';
        
        const optionsPanel = document.getElementById('optionsPanel');
        if (event.options && event.options.length > 0) {
          optionsPanel.innerHTML = event.options.map(opt => `
            <button class="option-btn" onclick="selectOption('${opt.id}')">
              <span class="option-text">${opt.text}</span>
              <span class="option-risk risk-${opt.risk || 'medium'}">${opt.risk || 'medium'}</span>
            </button>
          `).join('');
        }
      }
    }
    
    async function selectOption(optionId) {
      if (isProcessing) return;
      isProcessing = true;
      
      // 隐藏叙事和选项
      document.getElementById('narrativePanel').style.display = 'none';
      document.getElementById('optionsPanel').innerHTML = '';
      
      const state = window.SasaengSimulator.getState();
      
      try {
        // Phase 1: 生成结果叙述
        const result = await window.GameAPI.processChoice(optionId, state);
        
        if (result && result.data) {
          // 应用 LLM 返回的数值变化
          const changes = result.data.changes || {};
          Object.keys(changes).forEach(key => {
            if (state.attributes[key] !== undefined) {
              state.attributes[key] = Math.max(0, state.attributes[key] + changes[key]);
            }
            if (key === 'progress') {
              state.progress = Math.max(0, Math.min(100, state.progress + changes[key]));
            }
          });
          updateUI(state);
          
          // 检查游戏结束
          if (result.data.isGameOver) {
            showGameOver({ narrative: result.data.resultNarrative || '', isGameOver: true });
            isProcessing = false;
            return;
          }
          
          // 检查是否达到终局
          if (state.progress >= 100) {
            showResult(result.data, changes);
            return;
          }
          
          // 显示结果叙述（Phase 1），然后自动进入 Phase 2
          showResult(result.data, changes);
          isProcessing = false;
          return;
        }
        
        // 回退到本地引擎
        const localResult = window.SasaengSimulator.executeChoice({ id: optionId }, state.currentEvent?.eventId);
        if (localResult) {
          showChanges(localResult.changes);
          updateUI(window.SasaengSimulator.getState());
          
          if (localResult.isGameOver) {
            showGameOver(localResult);
            isProcessing = false;
            return;
          }
          
          if (localResult.isFinal) {
            showFinalChoice(localResult);
            isProcessing = false;
            return;
          }
          
          // 显示结果叙述，然后自动进入 Phase 2
          showResult({ resultNarrative: localResult.narrative || '……', mood: '' }, localResult.changes);
          isProcessing = false;
          return;
        }
      } catch (error) {
        console.error('游戏处理失败:', error);
        // 回退到本地引擎
        const localResult = window.SasaengSimulator.executeChoice({ id: optionId }, state.currentEvent?.eventId);
        if (localResult) {
          showChanges(localResult.changes);
          updateUI(window.SasaengSimulator.getState());
          if (localResult.isGameOver) {
            showGameOver(localResult);
          } else {
            showResult({ resultNarrative: localResult.narrative || '……' }, localResult.changes);
          }
        }
      }
      
      isProcessing = false;
    }
    
    function showFinalChoice(result) {
      document.getElementById('narrativeText').textContent = result.narrative;
      document.getElementById('eventName').textContent = '【终局抉择】';
      
      document.getElementById('optionsPanel').innerHTML = result.options.map(opt => `
        <button class="option-btn" onclick="selectFinalOption('${opt.id}')">
          <span class="option-text">${opt.text}</span>
          <span class="option-risk risk-extreme">终局</span>
        </button>
      `).join('');
    }
    
    async function selectFinalOption(optionId) {
      if (isProcessing) return;
      isProcessing = true;
      
      try {
        const result = window.SasaengSimulator.executeFinalChoice(optionId);
        showGameOver(result);
      } catch (error) {
        console.error('终局处理失败:', error);
      } finally {
        isProcessing = false;
      }
    }
    
    function showGameOver(result) {
      document.getElementById('gamePanel').style.display = 'none';
      document.getElementById('gameOverPanel').style.display = 'block';
      
      const titleEl = document.getElementById('gameOverTitle');
      const narrativeEl = document.getElementById('gameOverNarrative');
      
      // 尝试提取标题
      const titleMatch = result.narrative.match(/【(.+?)】/);
      if (titleMatch) {
        titleEl.textContent = titleMatch[1];
      } else {
        titleEl.textContent = '游戏结束';
      }
      
      narrativeEl.textContent = result.narrative;
    }
    
    function restartGame() {
      window.GameAPI.resetConversation();
      document.getElementById('gameContainer').classList.remove('god-view-mode');
      startGame();
    }
    
    // =============================================
    // 数据加载
    // =============================================
    
    function loadEventsData() {
      // events.js 已经在 data/events.json 中定义
      // 这里确保它被加载
      fetch('data/events.json')
        .then(r => r.json())
        .then(data => {
          window.EVENT_LIBRARY = data;
        })
        .catch(e => {
          console.warn('事件数据加载失败:', e);
        });
    }
    
    // 页面加载完成后检查数据
    document.addEventListener('DOMContentLoaded', () => {
      // 延迟加载事件数据
      if (!window.EVENT_LIBRARY) {
        fetch('data/events.json')
          .then(r => r.json())
          .then(data => {
            window.EVENT_LIBRARY = data;
          });
      }
    });
  </script>
</body>
</html>
